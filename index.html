<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bromley Lawn Tennis & Squash Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:ital,wght@0,500;0,600;0,700;0,800;1,500;1,700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:      '#0F2A1D',
          canvas:   '#F6F1E8',
          paper:    '#FBF8F2',
          club:     '#2D5A3F',
          clubDark: '#1F4029',
          clay:     '#C4623C',
          line:     '#D9D1BE',
          mute:     '#5B6B5F',
        },
        fontFamily: {
          display: ['"General Sans"', 'Inter', 'system-ui', 'sans-serif'],
          sans:    ['Inter', 'system-ui', 'sans-serif'],
          mono:    ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        boxShadow: {
          card: '0 1px 0 0 rgba(15,42,29,0.06), 0 8px 24px -12px rgba(15,42,29,0.18)',
        },
      }
    }
  }
</script>
<style>
  html, body { background: #F6F1E8; color: #0F2A1D; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .display {
    font-family: var(--display-font, '"General Sans"'), 'Inter', system-ui, sans-serif;
    letter-spacing: -0.025em;
    font-weight: 600;
  }
  .display .italic, .display em, .display i {
    font-family: var(--display-italic, '"Inter Tight"'), 'General Sans', system-ui, sans-serif;
    font-style: italic;
    font-weight: 500;
    letter-spacing: -0.015em;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* placeholder photo panel */
  .photo-ph {
    background-color: #E8DFC8;
    background-image:
      repeating-linear-gradient(135deg,
        rgba(15,42,29,0.05) 0 10px,
        rgba(15,42,29,0.00) 10px 20px);
    position: relative;
    overflow: hidden;
  }
  .photo-ph::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(120% 80% at 30% 20%, rgba(255,255,255,0.4), transparent 60%);
    pointer-events: none;
  }
  .photo-ph > .lbl {
    position: absolute; left: 12px; bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #0F2A1D; opacity: 0.65;
    background: rgba(246,241,232,0.8);
    padding: 4px 8px; border-radius: 4px;
    backdrop-filter: blur(2px);
  }

  /* fade-up on mount */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.5s ease-out both; }

  /* nav underline */
  .nav-link { position: relative; }
  .nav-link[data-active="true"]::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -6px;
    height: 2px; background: #2D5A3F;
  }

  /* sport tab underline */
  .tab-btn[data-active="true"] {
    border-color: #0F2A1D;
    color: #0F2A1D;
  }

  /* scroll margin for anchors on about page */
  [id] { scroll-margin-top: 96px; }

  /* subtle selection */
  ::selection { background: #C4623C; color: #FBF8F2; }

  /* hide scrollbar but keep scrollability */
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/pages-about.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
